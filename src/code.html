</div>
<!-- Progress Bar Container -->
<div class="w-full h-[1px] bg-white/10 relative overflow-hidden mb-4">
<div class="absolute top-0 left-0 h-full bg-white transition-all duration-300 ease-out shadow-[0_0_8px_rgba(255,255,255,0.8)]" id="progress-fill" style="width: 0%;"></div>
</div>
<!-- Status Text -->
<div class="text-center">
<span class="font-label-caps text-[10px] md:text-xs tracking-[0.4em] text-stark-gold uppercase animate-pulse-subtle">
      SYNCHRONIZING ASSETS
    </span>
</div>
</div>
<!-- Bottom Status (Optional metadata to keep the HUD feel) -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 text-center z-20">
<div class="font-code-sm text-[10px] text-on-surface-variant/30 uppercase tracking-widest">
    STARK_OS // MK_85_RECOVERY_PROTOCOL
  </div>
</div>
<script>
    let progress = 0;
    const progressFill = document.getElementById('progress-fill');
    const percentBg = document.getElementById('percent-display-bg');

    function updateProgress() {
      if (progress < 100) {
        // Variable speed for realism
        const increment = Math.random() * 0.8;
        progress += increment;
        
        if (progress > 100) progress = 100;
        
        const roundedProgress = Math.floor(progress);
        
        // Update bar
        progressFill.style.width = `${progress}%`;
        
        // Update large background percentage
        percentBg.innerText = `${roundedProgress}%`;

        // Adjust background visibility slightly as it completes
        const opacity = 0.04 + (progress / 100) * 0.02;
        percentBg.style.color = `rgba(255, 255, 255, ${opacity})`;

        requestAnimationFrame(updateProgress);
      } else {
        percentBg.innerText = "100%";
        progressFill.style.width = "100%";
        // Final state glow or pulse could be added here
      }
    }

    // Brief initialization delay
    setTimeout(() => {
      updateProgress();
    }, 500);
  </script>
